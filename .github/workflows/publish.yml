name: Publish Package

on:
  push:
    tags:
      - v*.*.*

permissions:
  # Required for OIDC authentication to npm (https://docs.npmjs.com/trusted-publishers)
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        # Node 24 ships npm >= 11.5.1, required for OIDC authentication to npm
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: ./bun ci
      - name: Verify package.json version matches tag
        run: |
          package_version="$(./bun -e 'console.log(require("./package.json").version)')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "package.json version ($package_version) does not match tag ($tag_version)"
            exit 1
          fi
          echo "package.json version ($package_version) matches tag ($tag_version)"
      - name: Publish to npm
        run: npm publish
  notify-publish:
    name: Notify Publish to Slack
    runs-on: ubuntu-latest
    needs: publish
    if: success()
    steps:
      - name: Set version
        id: version
        run: echo "number=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Post to Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            unfurl_links: false
            unfurl_media: false
            text: "@tigerdata/mcp-boilerplate@${{ steps.version.outputs.number }} published to npm"
            blocks:
              - type: "markdown"
                text: |
                  **@tigerdata/mcp-boilerplate@${{ steps.version.outputs.number }} published to npm**
                  [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) | [npm](https://www.npmjs.com/package/@tigerdata/mcp-boilerplate/v/${{ steps.version.outputs.number }})
